<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent | James Christian Pineda</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0b1d;
        color: #f8fafc;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(216, 180, 254, 0.22), transparent 32rem),
          #0f0b1d;
      }

      main {
        width: min(90vw, 36rem);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 1.5rem;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.35);
      }

      a {
        display: inline-flex;
        margin-top: 1.25rem;
        border-radius: 999px;
        background: #d8b4fe;
        padding: 0.75rem 1.25rem;
        color: #0f172a;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Message sent</p>
      <h1>Thanks for reaching out.</h1>
      <p>I received your message and will get back to you soon.</p>
      <a href="/">Back to portfolio</a>
    </main>
  </body>
</html>
